type User @entity {
  id: Bytes! # address
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  isInitialized: Boolean!
  lastActivity: BigInt! # block timestamp
  deposits: [Deposit!]! @derivedFrom(field: "user")
  paymentsFrom: [Payment!]! @derivedFrom(field: "from")
  paymentsTo: [Payment!]! @derivedFrom(field: "to")
  withdrawals: [Withdrawal!]! @derivedFrom(field: "user")
}

type Payment @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  from: User!
  to: User!
  minPrice: BigInt!
  nonce: Bytes!
  memo: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type Deposit @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  user: User!
  amount: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type Withdrawal @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  user: User!
  amount: BigInt!
  type: String! # "requested" | "cancelled" | "expired" | "finalized"
  expiresAt: BigInt
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type PoolStats @entity {
  id: Bytes! # singleton "pool-stats"
  totalDeposits: BigInt!
  totalPayments: BigInt!
  totalWithdrawals: BigInt!
  totalFees: BigInt!
  isPaused: Boolean!
  currentOwner: Bytes!
  pendingOwner: Bytes
  treasury: Bytes!
  maxPoolBalance: BigInt!
  maxUserDeposit: BigInt!
}

type CapUpdate @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  maxPoolBalance: BigInt!
  maxUserDeposit: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type TreasuryAction @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  type: String! # "updated" | "withdrawn"
  oldTreasury: Bytes
  newTreasury: Bytes
  treasury: Bytes
  amount: BigInt
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# ═══════════════════════════════════════
# ConfidentialACP — ERC-8183 Job Escrow
# ═══════════════════════════════════════

type ConfidentialJob @entity {
  id: String! # jobId as string
  jobId: BigInt!
  client: Bytes! # address
  provider: Bytes! # address
  evaluator: Bytes! # address
  expiredAt: BigInt!
  status: String! # "created" | "funded" | "submitted" | "completed" | "rejected" | "refunded"
  deliverable: Bytes
  completionReason: Bytes
  rejectionReason: Bytes
  createdAt: BigInt!
  createdTxHash: Bytes!
  fundedAt: BigInt
  submittedAt: BigInt
  completedAt: BigInt
  rejectedAt: BigInt
  refundedAt: BigInt
  events: [ConfidentialJobEvent!]! @derivedFrom(field: "job")
}

type ConfidentialJobEvent @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  job: ConfidentialJob!
  type: String! # "created" | "funded" | "submitted" | "completed" | "payment_released" | "rejected" | "refunded"
  actor: Bytes! # address that triggered the event
  data: Bytes # deliverable or reason bytes32
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type ACPStats @entity {
  id: String! # singleton "acp-stats"
  totalJobs: BigInt!
  totalFunded: BigInt!
  totalCompleted: BigInt!
  totalRejected: BigInt!
  totalRefunded: BigInt!
}
